services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runtime
    container_name: ledger-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/ledger
      RUST_LOG: idempotent_ledger_rs=info,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

volumes:
  ledger_postgres_data:
